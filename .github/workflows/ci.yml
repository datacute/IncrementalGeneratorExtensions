name: Build

on:
  push:
    branches:
    - main
    - develop
    tags:
    - '*.*.*'
  pull_request:
    branches:
    - main
    - develop
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to process (leave empty for normal branch builds)'
        required: false
        type: string
    
permissions:
  checks: write
  statuses: write
  contents: write

jobs:
  build:

    env:
      BUILD_CONFIG: 'Release'
      SOLUTION: '*.sln'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Select release tag
      if: inputs.release_tag != ''
      run: git checkout --detach "tags/${{ inputs.release_tag }}"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Resolve tag for current commit
      id: get_tag
      run: |
        # Try to get the exact tag pointing to the current HEAD
        TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)

        # Export the tag output only (no echoing of the tag itself)
        echo "tag=${TAG}" >> $GITHUB_OUTPUT

    - name: Set Version Profile
      run: |
        if [[ "${{ steps.get_tag.outputs.tag }}" != "" ]]; then
          echo "VERSION_PROFILE=release" >> $GITHUB_ENV
        else
          echo "VERSION_PROFILE=ci" >> $GITHUB_ENV
        fi
    
    - name: Restore dependencies
      run: dotnet restore $SOLUTION

    - name: Build
      run: dotnet build $SOLUTION --configuration $BUILD_CONFIG --no-restore -p:GeneratePackageOnBuild=false -p:VersionProfile=${{ env.VERSION_PROFILE }}

    - name: Run tests
      run: dotnet test --configuration $BUILD_CONFIG --no-restore --no-build --verbosity normal -p:VersionProfile=${{ env.VERSION_PROFILE }}

    - name: Pack NuGet packages
      run: |
        dotnet pack $SOLUTION --configuration $BUILD_CONFIG --no-build --output ./artifacts -p:VersionProfile=${{ env.VERSION_PROFILE }}
        echo "=== Packages created ==="
        ls -la ./artifacts/

    - name: Extract release notes from CHANGELOG.md
      if: steps.get_tag.outputs.tag != ''
      id: extract_notes
      uses: mindsers/changelog-reader-action@v2
      with:
        version: ${{ steps.get_tag.outputs.tag }}
        path: ./CHANGELOG.md

    - name: Create GitHub Release
      if: steps.get_tag.outputs.tag != ''
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_tag.outputs.tag }}
        body: ${{ steps.extract_notes.outputs.changes }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
